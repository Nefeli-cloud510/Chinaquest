<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 纯白背景 -->
  <rect width="512" height="512" fill="#FFFFFF"/>
  
  <!-- 印章主体：红色方块 -->
  <rect x="32" y="32" width="448" height="448" fill="#DC2626" rx="16" ry="16"/>
  
  <!-- 金色边框 -->
  <rect x="40" y="40" width="432" height="432" 
        fill="none" 
        stroke="#FFD700" 
        stroke-width="6" 
        rx="12" 
        ry="12"/>
  
  <!-- 四角定位标记（Hiro 风格） -->
  <g fill="#FFFFFF">
    <!-- 左上 -->
    <rect x="60" y="60" width="80" height="80" rx="8"/>
    <!-- 右上 -->
    <rect x="372" y="60" width="80" height="80" rx="8"/>
    <!-- 左下 -->
    <rect x="60" y="372" width="80" height="80" rx="8"/>
    <!-- 右下 -->
    <rect x="372" y="372" width="80" height="80" rx="8"/>
  </g>
  
  <!-- 中心图案：白色天坛剪影 -->
  <g transform="translate(256, 256)" fill="#FFFFFF">
    <!-- 三层基座 -->
    <rect x="-120" y="80" width="240" height="30" rx="4"/>
    <rect x="-100" y="50" width="200" height="30" rx="4"/>
    <rect x="-80" y="20" width="160" height="30" rx="4"/>
    
    <!-- 主体建筑 -->
    <rect x="-60" y="-40" width="120" height="60" rx="8"/>
    
    <!-- 屋顶 -->
    <polygon points="-70,-40 0,-100 70,-40"/>
    <polygon points="-50,-50 0,-90 50,-50" fill="#DC2626"/>
    
    <!-- 宝顶 -->
    <circle cx="0" cy="-100" r="12"/>
  </g>
  
  <!-- 文字 -->
  <g text-anchor="middle" fill="#FFFFFF">
    <text x="256" y="460" font-size="32" font-weight="bold" style="font-family: 'Microsoft YaHei', sans-serif;">
      扫描我
    </text>
    <text x="256" y="490" font-size="18" opacity="0.9">
      SCAN ME
    </text>
  </g>
</svg>
