<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>ChinaQuest Temple Marker AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="../vendor/arjs/aframe-ar.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: var(--cq-vw, 100vw);
        height: var(--cq-vh, 100vh);
        min-height: var(--cq-vh, 100dvh);
        overflow: hidden;
        background: #000;
      }

      video,
      .a-canvas,
      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: var(--cq-vw, 100vw) !important;
        height: var(--cq-vh, 100vh) !important;
        min-width: var(--cq-vw, 100dvw) !important;
        min-height: var(--cq-vh, 100dvh) !important;
      }

      video {
        z-index: 1 !important;
        display: block !important;
        object-fit: cover !important;
        background: #000 !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
      }

      .a-canvas,
      a-scene {
        z-index: 2 !important;
        background: transparent !important;
      }

      canvas:not(.a-canvas) {
        position: absolute !important;
        width: 0 !important;
        height: 0 !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }

      .arjs-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.78);
        color: #fff;
        font: 16px/1.4 Arial, sans-serif;
        z-index: 9999;
        text-align: center;
        padding: 24px;
      }

      .status {
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        z-index: 10000;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.62);
        color: #fff;
        font: 13px/1.4 Arial, sans-serif;
      }

      .scale-controls {
        position: fixed;
        right: 12px;
        bottom: 12px;
        z-index: 10001;
        display: flex;
        gap: 8px;
      }

      .scale-controls button {
        width: 44px;
        height: 44px;
        border: 0;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.62);
        color: #fff;
        font: 600 18px/1 Arial, sans-serif;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="arjs-loader" id="loader">Loading AR scene...</div>
    <div class="status" id="status">Initializing AR...</div>
    <div class="scale-controls" aria-label="Model scale controls">
      <button id="scale-down" type="button" aria-label="Scale down">-</button>
      <button id="scale-reset" type="button" aria-label="Reset scale">1:1</button>
      <button id="scale-up" type="button" aria-label="Scale up">+</button>
    </div>
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="antialias: false; alpha: true;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
    >
      <a-assets>
        <a-asset-item id="temple-model" src="../ar-models/temple-of-heaven.glb"></a-asset-item>
      </a-assets>

      <a-marker
        id="hiro-marker"
        type="pattern"
        url="./patterns/pattern-temple_of_heaven_hiro.patt"
        emitevents="true"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5"
      >
        <a-entity
          id="temple-wrapper"
          position="0 0 0"
          rotation="0 0 0"
          visible="false"
        >
          <a-entity
            id="temple-entity"
            gltf-model="#temple-model"
            position="0 0 0"
            rotation="-90 180 180"
            scale="0.00072 0.00072 0.00072"
          ></a-entity>
        </a-entity>
      </a-marker>

      <a-entity light="type: ambient; color: #ffffff; intensity: 1.1"></a-entity>
      <a-entity
        light="type: directional; color: #ffffff; intensity: 0.9"
        position="1 2 1"
      ></a-entity>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      (function () {
        const origin = window.location.origin;
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const scene = document.querySelector('a-scene');
        const marker = document.getElementById('hiro-marker');
        const model = document.getElementById('temple-entity');
        const modelWrapper = document.getElementById('temple-wrapper');
        const scaleDownButton = document.getElementById('scale-down');
        const scaleResetButton = document.getElementById('scale-reset');
        const scaleUpButton = document.getElementById('scale-up');
        const DEFAULT_SCALE = 0.00072;
        let currentScale = DEFAULT_SCALE;

        function emit(type, detail) {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(
              { source: 'chinaquest-ar', type: type, detail: detail || null },
              origin
            );
          }
        }

        function hideLoader() {
          if (loader) {
            loader.style.display = 'none';
          }
        }

        function setStatus(message) {
          if (status) {
            status.textContent = message;
          }
        }

        function updateViewportVariables() {
          const viewport = window.visualViewport;
          const viewportWidth = viewport ? viewport.width : window.innerWidth;
          const viewportHeight = viewport ? viewport.height : window.innerHeight;
          document.documentElement.style.setProperty('--cq-vw', viewportWidth + 'px');
          document.documentElement.style.setProperty('--cq-vh', viewportHeight + 'px');
          document.body.style.width = viewportWidth + 'px';
          document.body.style.height = viewportHeight + 'px';
          scene.style.width = viewportWidth + 'px';
          scene.style.height = viewportHeight + 'px';
        }

        function forceFullscreenStyle(element, zIndex) {
          element.style.position = 'fixed';
          element.style.top = '50%';
          element.style.left = '50%';
          element.style.right = 'auto';
          element.style.bottom = 'auto';
          element.style.transform = 'translate(-50%, -50%)';
          element.style.margin = '0';
          element.style.padding = '0';
          element.style.display = 'block';
          element.style.opacity = '1';
          element.style.visibility = 'visible';
          element.style.zIndex = String(zIndex);
          element.style.maxWidth = 'none';
          element.style.maxHeight = 'none';
          element.style.background = 'transparent';
          element.style.border = '0';
        }

        function resizeElementToCover(element, sourceWidth, sourceHeight, zIndex) {
          const viewport = window.visualViewport;
          const viewportWidth = viewport ? viewport.width : window.innerWidth;
          const viewportHeight = viewport ? viewport.height : window.innerHeight;
          const mediaWidth = sourceWidth || 1280;
          const mediaHeight = sourceHeight || 720;
          const viewportRatio = viewportWidth / viewportHeight;
          const mediaRatio = mediaWidth / mediaHeight;
          const overscan = 48;

          let renderWidth = viewportWidth;
          let renderHeight = viewportHeight;

          if (mediaRatio > viewportRatio) {
            renderHeight = viewportHeight + overscan;
            renderWidth = renderHeight * mediaRatio;
          } else {
            renderWidth = viewportWidth + overscan;
            renderHeight = renderWidth / mediaRatio;
          }

          forceFullscreenStyle(element, zIndex);
          element.style.width = renderWidth + 'px';
          element.style.height = renderHeight + 'px';
        }

        function ensureLayersVisible() {
          updateViewportVariables();
          const video = document.querySelector('video');
          const canvas = document.querySelector('.a-canvas');
          if (!video) {
            return false;
          }

          video.setAttribute('playsinline', 'true');
          video.muted = true;
          video.style.display = 'block';
          video.style.opacity = '1';
          video.style.visibility = 'visible';
          video.style.objectFit = 'cover';
          resizeElementToCover(video, video.videoWidth, video.videoHeight, 1);

          if (canvas) {
            resizeElementToCover(canvas, video.videoWidth, video.videoHeight, 2);
          }

          scene.style.position = 'fixed';
          scene.style.inset = '0';
          scene.style.zIndex = '2';
          return true;
        }

        function applyScale(scale) {
          currentScale = Math.max(0.00035, Math.min(0.0018, scale));
          model.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        }

        function hideUnwantedMeshes(root) {
          root.traverse(function (obj) {
            if (!obj.isMesh) {
              return;
            }

            if (obj.name === 'Di_mian04') {
              obj.visible = false;
            }
          });
        }

        function recenterModel(root) {
          const three = AFRAME.THREE;
          const box = new three.Box3().setFromObject(root);
          if (box.isEmpty()) {
            return;
          }

          const center = new three.Vector3();
          box.getCenter(center);
          root.position.x -= center.x;
          root.position.z -= center.z;
          root.position.y -= box.min.y;
        }

        scene.addEventListener('loaded', function () {
          hideLoader();
          const videoReady = ensureLayersVisible();
          setStatus(
            videoReady
              ? 'AR scene loaded. Point the camera at the custom Temple marker.'
              : 'AR scene loaded, but camera video is not visible yet.'
          );
          emit('scene-loaded');
        });

        scene.addEventListener('camera-init', function () {
          ensureLayersVisible();
          setStatus('Camera initialized. Point the camera at the custom Temple marker.');
          emit('camera-init');
        });

        scene.addEventListener('camera-error', function (event) {
          const detail = event && event.detail ? JSON.stringify(event.detail) : 'Camera error.';
          setStatus(detail);
          emit('error', detail);
        });

        marker.addEventListener('markerFound', function () {
          setStatus('Temple marker detected. The Temple model is anchored to the marker.');
          if (modelWrapper) {
            modelWrapper.setAttribute('visible', 'true');
          }
          emit('marker-found');
        });

        marker.addEventListener('markerLost', function () {
          setStatus('Marker lost. Move the Temple marker back into view.');
          if (modelWrapper) {
            modelWrapper.setAttribute('visible', 'false');
          }
          emit('marker-lost');
        });

        model.addEventListener('model-loaded', function () {
          const meshRoot = model.getObject3D('mesh');
          if (meshRoot) {
            hideUnwantedMeshes(meshRoot);
            recenterModel(meshRoot);
          }

          applyScale(DEFAULT_SCALE);
          if (modelWrapper) {
            modelWrapper.setAttribute('visible', 'false');
          }
          setStatus('Temple model loaded. You can use the bottom-right buttons to resize it.');
          emit('model-loaded');
        });

        model.addEventListener('model-error', function () {
          setStatus('Temple model failed to load, but marker test can still continue.');
          emit('error', 'Temple model failed to load.');
        });

        window.addEventListener('error', function (event) {
          setStatus(event.message || 'Unknown runtime error.');
          emit('error', event.message || 'Unknown runtime error.');
        });

        new MutationObserver(function () {
          ensureLayersVisible();
        }).observe(document.body, { childList: true, subtree: true });

        if (scaleDownButton) {
          scaleDownButton.addEventListener('click', function () {
            applyScale(currentScale * 0.85);
          });
        }

        if (scaleResetButton) {
          scaleResetButton.addEventListener('click', function () {
            applyScale(DEFAULT_SCALE);
          });
        }

        if (scaleUpButton) {
          scaleUpButton.addEventListener('click', function () {
            applyScale(currentScale * 1.18);
          });
        }

        updateViewportVariables();
        window.setInterval(ensureLayersVisible, 1000);
        window.addEventListener('resize', ensureLayersVisible);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', ensureLayersVisible);
        }
      })();
    </script>
  </body>
  </html>
