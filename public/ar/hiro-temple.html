<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>ChinaQuest Temple Marker AR</title>
    <script src="../vendor/aframe/aframe.min.js"></script>
    <script src="../vendor/arjs/aframe-ar.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: var(--cq-vw, 100vw);
        height: var(--cq-vh, 100vh);
        min-height: var(--cq-vh, 100dvh);
        overflow: hidden;
        background: #000;
      }

      video,
      .a-canvas,
      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: var(--cq-vw, 100vw) !important;
        height: var(--cq-vh, 100vh) !important;
      }

      video {
        z-index: 1 !important;
        display: block !important;
        background: #000 !important;
        object-fit: cover !important;
        object-position: center center !important;
      }

      .a-canvas,
      a-scene {
        z-index: 2 !important;
        background: transparent !important;
      }

      canvas:not(.a-canvas) {
        position: absolute !important;
        width: 0 !important;
        height: 0 !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }

      .arjs-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.78);
        color: #fff;
        font: 16px/1.4 Arial, sans-serif;
        z-index: 9999;
        text-align: center;
        padding: 24px;
      }

      .status {
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        z-index: 10000;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.48);
        color: #fff;
        font: 12px/1.35 Arial, sans-serif;
      }

      .debug-log {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 68px;
        z-index: 10000;
        max-height: 24vh;
        overflow: auto;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.58);
        color: rgba(255, 255, 255, 0.88);
        font: 11px/1.45 Consolas, Monaco, monospace;
        white-space: pre-wrap;
        pointer-events: none;
        display: none;
      }

      .debug-log.visible {
        display: block;
      }

      .runtime-debug {
        position: fixed;
        left: 12px;
        bottom: 60px;
        z-index: 10000;
        max-width: min(320px, calc(100vw - 24px));
        max-height: 32vh;
        overflow: auto;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.62);
        color: rgba(255, 255, 255, 0.92);
        font: 11px/1.4 Consolas, Monaco, monospace;
        white-space: pre-wrap;
        pointer-events: none;
      }

      .scale-controls {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 10001;
        display: flex;
        gap: 8px;
      }

      .scale-controls button {
        width: 38px;
        height: 38px;
        border: 0;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.48);
        color: #fff;
        font: 600 15px/1 Arial, sans-serif;
        cursor: pointer;
      }

      .narrative-anchor {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 10002;
        display: none;
        max-width: min(420px, calc(100vw - 16px));
        transform: translate(-50%, -102%);
        pointer-events: auto;
      }

      .narrative-anchor.visible {
        display: block;
      }

      .narrative-prompt,
      .narrative-bubble {
        position: relative;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.94);
        color: #111827;
        border: 1px solid rgba(17, 24, 39, 0.08);
        box-shadow: 0 14px 32px rgba(0, 0, 0, 0.18);
      }

      .narrative-prompt {
        display: none;
        padding: 10px 14px;
        font: 600 13px/1.4 Arial, sans-serif;
      }

      .narrative-bubble {
        display: none;
        min-width: min(180px, calc(100vw - 32px));
        max-width: min(260px, calc(100vw - 32px));
        padding: 12px 14px;
      }

      .narrative-prompt::after,
      .narrative-bubble::after {
        content: '';
        position: absolute;
        bottom: 12px;
        width: 12px;
        height: 12px;
        background: rgba(255, 255, 255, 0.94);
        border-bottom: 1px solid rgba(17, 24, 39, 0.08);
      }

      .narrative-anchor.side-left .narrative-prompt::after,
      .narrative-anchor.side-left .narrative-bubble::after {
        right: -6px;
        border-right: 1px solid rgba(17, 24, 39, 0.08);
        transform: rotate(45deg);
      }

      .narrative-anchor.side-right .narrative-prompt::after,
      .narrative-anchor.side-right .narrative-bubble::after {
        left: -6px;
        border-left: 1px solid rgba(17, 24, 39, 0.08);
        transform: rotate(45deg);
      }

      .narrative-prompt.visible,
      .narrative-bubble.visible {
        display: block;
      }

      .narrative-title {
        font: 600 12px/1.2 Arial, sans-serif;
        color: #b45309;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .narrative-text {
        margin-top: 6px;
        color: #111827;
        font: 14px/1.55 Arial, sans-serif;
      }

      .narrative-tip {
        margin-top: 8px;
        font: 11px/1.35 Arial, sans-serif;
        color: rgba(17, 24, 39, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="arjs-loader" id="loader">Loading AR scene...</div>
    <div class="status" id="status">Initializing AR...</div>
    <pre class="debug-log" id="debug-log">booting...</pre>
    <pre class="runtime-debug" id="runtime-debug">collecting runtime info...</pre>
    <div class="scale-controls" aria-label="Model scale controls">
      <button id="scale-down" type="button" aria-label="Scale down">-</button>
      <button id="scale-reset" type="button" aria-label="Reset scale">1:1</button>
      <button id="scale-up" type="button" aria-label="Scale up">+</button>
    </div>
    <div id="narrative-anchor" class="narrative-anchor" aria-live="polite">
      <button id="narrative-prompt" class="narrative-prompt" type="button">
        Tap the Temple to start the story.
      </button>
      <button id="narrative-bubble" class="narrative-bubble" type="button">
        <div class="narrative-title" id="narrative-title">Temple of Heaven</div>
        <div class="narrative-text" id="narrative-text"></div>
        <div class="narrative-tip" id="narrative-tip">Tap again for the next line.</div>
      </button>
    </div>
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="antialias: false; alpha: true;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
    >
      <a-marker
        id="hiro-marker"
        type="pattern"
        url="./patterns/pattern-temple_of_heaven_hiro.patt"
        emitevents="true"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5"
      >
        <a-entity
          id="temple-wrapper"
          position="0 0 0"
          rotation="0 0 0"
          visible="false"
        >
          <a-entity
            id="temple-entity"
            gltf-model="../ar-models/temple-of-heaven-mobile-plain.glb"
            position="0 0 0"
            rotation="-90 180 180"
            scale="0.00072 0.00072 0.00072"
          ></a-entity>
        </a-entity>
      </a-marker>

      <a-entity light="type: ambient; color: #ffffff; intensity: 1.1"></a-entity>
      <a-entity
        light="type: directional; color: #ffffff; intensity: 0.9"
        position="1 2 1"
      ></a-entity>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      (function () {
        const origin = window.location.origin;
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const debugLogPanel = document.getElementById('debug-log');
        const runtimeDebugPanel = document.getElementById('runtime-debug');
        const scene = document.querySelector('a-scene');
        const marker = document.getElementById('hiro-marker');
        const model = document.getElementById('temple-entity');
        const modelWrapper = document.getElementById('temple-wrapper');
        const scaleDownButton = document.getElementById('scale-down');
        const scaleResetButton = document.getElementById('scale-reset');
        const scaleUpButton = document.getElementById('scale-up');
        const narrativeAnchor = document.getElementById('narrative-anchor');
        const narrativePrompt = document.getElementById('narrative-prompt');
        const narrativeBubble = document.getElementById('narrative-bubble');
        const narrativeTitle = document.getElementById('narrative-title');
        const narrativeText = document.getElementById('narrative-text');
        const narrativeTip = document.getElementById('narrative-tip');
        const DEFAULT_SCALE = 0.00072;
        const SCALE_STORAGE_KEY = 'chinaquest.temple-ar.scale';
        const SCALE_MIN = 0.0002;
        const SCALE_MAX = 0.0018;
        const BASE_ROTATION = { x: -90, y: 180, z: 180 };
        const MODEL_HEIGHT = 1812.66619873;
        const MODEL_WIDTH = 3254.69506836;
        const ENTRY_RISE = 0.18;
        const ENTRY_DURATION_MS = 2000;
        const HIDDEN_MESHES = new Set(['Di_mian04']);
        const narrativeLines = {
          zh: [
            '我是天坛，明清两代皇帝曾在这里祭天祈谷。',
            '你眼前的主体建筑名为祈年殿，象征着对风调雨顺与五谷丰登的祈愿。',
            '请沿着我的轮廓慢慢移动视角，你会更清楚地看到屋顶层层叠起的结构。',
            '继续探索吧，后续我们还能在这里接入更多故事、任务与互动内容。',
          ],
          en: [
            'I am the Temple of Heaven, where emperors once prayed for good harvests.',
            'The main structure before you is the Hall of Prayer for Good Harvests.',
            'Move around slowly and you will see the layered roof structure more clearly.',
            'Keep exploring. More stories, missions, and interactions can be added here next.',
          ],
        };
        let preferredScale = DEFAULT_SCALE;
        let currentScale = DEFAULT_SCALE;
        let currentLanguage = 'en';
        let narrativeIndex = -1;
        let currentBubbleSide = 'right';
        let markerVisible = false;
        let modelReady = false;
        let hasPlayedEntryAnimation = false;
        let isEntryAnimationRunning = false;
        const SHOULD_REPORT_DIAGNOSTICS = false;
        const DEBUG_ENABLED = new URLSearchParams(window.location.search).get('debug') === '1';
        const debugLines = [];
        let trackedVideo = null;
        let lastStatusMessage = 'Initializing AR...';

        function emit(type, detail) {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(
              { source: 'chinaquest-ar', type: type, detail: detail || null },
              origin
            );
          }
        }

        function hideLoader() {
          if (loader) {
            loader.style.display = 'none';
          }
        }

        function setStatus(message) {
          lastStatusMessage = message;
          if (status) {
            status.textContent = message;
          }
          refreshRuntimeDebug();
        }

        function pushDebug(message) {
          if (!DEBUG_ENABLED) {
            return;
          }

          const timestamp = new Date().toISOString().slice(11, 19);
          const line = `[${timestamp}] ${message}`;
          debugLines.push(line);
          while (debugLines.length > 10) {
            debugLines.shift();
          }
          if (debugLogPanel) {
            debugLogPanel.textContent = debugLines.join('\n');
          }
          emit('debug', line);
        }

        function clampScale(scale) {
          return Math.max(SCALE_MIN, Math.min(SCALE_MAX, scale));
        }

        function loadPreferredScale() {
          try {
            const raw = window.localStorage.getItem(SCALE_STORAGE_KEY);
            if (!raw) {
              return DEFAULT_SCALE;
            }
            const parsed = Number(raw);
            return Number.isFinite(parsed) ? clampScale(parsed) : DEFAULT_SCALE;
          } catch {
            return DEFAULT_SCALE;
          }
        }

        function savePreferredScale(scale) {
          try {
            window.localStorage.setItem(SCALE_STORAGE_KEY, String(clampScale(scale)));
          } catch {
            // Ignore storage failures on restricted browsers.
          }
        }

        function collectDiagnostics(trigger, viewportWidth, viewportHeight) {
          const viewport = window.visualViewport;
          const video = document.querySelector('video');
          const canvas = document.querySelector('.a-canvas');
          const videoRect = video ? video.getBoundingClientRect() : null;
          const canvasRect = canvas ? canvas.getBoundingClientRect() : null;
          const sceneCanvasRect = scene && scene.canvas ? scene.canvas.getBoundingClientRect() : null;

          return {
            trigger: trigger,
            page: 'hiro-temple',
            url: window.location.href,
            userAgent: navigator.userAgent,
            timestamp: new Date().toISOString(),
            screen: window.screen
              ? {
                  width: window.screen.width,
                  height: window.screen.height,
                  availWidth: window.screen.availWidth,
                  availHeight: window.screen.availHeight,
                }
              : {},
            inner: {
              width: window.innerWidth,
              height: window.innerHeight,
            },
            viewport: viewport
              ? {
                  width: Math.round(viewport.width),
                  height: Math.round(viewport.height),
                  offsetTop: Math.round(viewport.offsetTop),
                  offsetLeft: Math.round(viewport.offsetLeft),
                }
              : {},
            document: {
              clientWidth: document.documentElement.clientWidth,
              clientHeight: document.documentElement.clientHeight,
            },
            target: {
              width: viewportWidth,
              height: viewportHeight,
            },
            video: {
              domWidth: videoRect ? Math.round(videoRect.width) : 0,
              domHeight: videoRect ? Math.round(videoRect.height) : 0,
              sourceWidth: video && video.videoWidth ? video.videoWidth : 0,
              sourceHeight: video && video.videoHeight ? video.videoHeight : 0,
              readyState: video && typeof video.readyState === 'number' ? video.readyState : 0,
            },
            canvas: {
              domWidth: canvasRect ? Math.round(canvasRect.width) : 0,
              domHeight: canvasRect ? Math.round(canvasRect.height) : 0,
              sceneWidth: sceneCanvasRect ? Math.round(sceneCanvasRect.width) : 0,
              sceneHeight: sceneCanvasRect ? Math.round(sceneCanvasRect.height) : 0,
            },
            scale: {
              preferred: preferredScale,
              current: currentScale,
            },
          };
        }

        function reportDiagnostics(trigger, viewportWidth, viewportHeight) {
          if (!SHOULD_REPORT_DIAGNOSTICS) {
            return;
          }

          try {
            fetch('/api/ar-diagnostics', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(collectDiagnostics(trigger, viewportWidth, viewportHeight)),
              keepalive: true,
            }).catch(function () {
              // Keep AR stable even if diagnostics upload fails.
            });
          } catch {
            // Diagnostics must never break AR startup.
          }
        }

        function getLang() {
          const queryLang = new URLSearchParams(window.location.search).get('lang');
          return queryLang === 'zh' ? 'zh' : 'en';
        }

        function setNarrativeVisibility(showPrompt, showBubble) {
          if (!narrativeAnchor || !narrativePrompt || !narrativeBubble) {
            return;
          }

          const shouldShowAnchor = showPrompt || showBubble;
          narrativeAnchor.classList.toggle('side-left', currentBubbleSide === 'left');
          narrativeAnchor.classList.toggle('side-right', currentBubbleSide === 'right');
          narrativeAnchor.classList.toggle('visible', shouldShowAnchor);
          narrativePrompt.classList.toggle('visible', showPrompt);
          narrativeBubble.classList.toggle('visible', showBubble);
        }

        function resetNarrative() {
          narrativeIndex = -1;
          currentBubbleSide = 'right';
          setNarrativeVisibility(false, false);
        }

        function advanceNarrative() {
          if (!markerVisible) {
            return;
          }

          const lines = narrativeLines[currentLanguage];
          narrativeIndex = Math.min(narrativeIndex + 1, lines.length - 1);
          currentBubbleSide = narrativeIndex % 2 === 0 ? 'left' : 'right';
          if (narrativeTitle) {
            narrativeTitle.textContent = currentLanguage === 'zh' ? '天坛' : 'Temple of Heaven';
          }
          if (narrativeText) {
            narrativeText.textContent = lines[narrativeIndex];
          }
          if (narrativeTip) {
            narrativeTip.textContent =
              narrativeIndex >= lines.length - 1
                ? currentLanguage === 'zh'
                  ? '已到最后一句，继续点击可重复查看。'
                  : 'This is the final line. Tap again to replay.'
                : currentLanguage === 'zh'
                  ? '继续点击，聆听下一句。'
                  : 'Tap again for the next line.';
          }
          setNarrativeVisibility(false, true);
        }

        function getViewportSize() {
          const docEl = document.documentElement;
          const width = Math.max(window.innerWidth || 0, docEl ? docEl.clientWidth : 0);
          const visualViewportHeight = window.visualViewport
            ? Math.round(window.visualViewport.height + window.visualViewport.offsetTop)
            : 0;
          const height = Math.max(
            window.innerHeight || 0,
            docEl ? docEl.clientHeight : 0,
            visualViewportHeight
          );

          return {
            width: Math.max(1, width),
            height: Math.max(1, height),
          };
        }

        function refreshRuntimeDebug() {
          if (!runtimeDebugPanel) {
            return;
          }

          const viewportSize = getViewportSize();
          const viewport = window.visualViewport;
          const video = document.querySelector('video');
          const canvas = document.querySelector('.a-canvas');
          const mesh = model.getObject3D('mesh');
          const videoRect = video ? video.getBoundingClientRect() : null;
          const canvasRect = canvas ? canvas.getBoundingClientRect() : null;
          const sceneCanvasRect = scene && scene.canvas ? scene.canvas.getBoundingClientRect() : null;
          const rotation = model.getAttribute('rotation');
          const scale = model.getAttribute('scale');
          const wrapperVisible = modelWrapper ? modelWrapper.getAttribute('visible') : false;
          const meshVisible = mesh ? mesh.visible : false;
          const activeEvents = debugLines.slice(-3).join(' | ') || 'none';

          runtimeDebugPanel.textContent = [
            `status=${lastStatusMessage}`,
            `marker=${markerVisible} modelReady=${modelReady} mesh=${!!mesh} meshVisible=${meshVisible}`,
            `wrapperVisible=${wrapperVisible} entryRunning=${isEntryAnimationRunning}`,
            `vw=${viewportSize.width} vh=${viewportSize.height} inner=${window.innerWidth}x${window.innerHeight}`,
            `vv=${viewport ? `${Math.round(viewport.width)}x${Math.round(viewport.height)}@${Math.round(viewport.offsetTop)}` : 'none'}`,
            `videoDom=${videoRect ? `${Math.round(videoRect.width)}x${Math.round(videoRect.height)}` : 'none'}`,
            `videoSrc=${video && video.videoWidth ? `${video.videoWidth}x${video.videoHeight}` : '0x0'} ready=${video && typeof video.readyState === 'number' ? video.readyState : 0}`,
            `canvas=${canvasRect ? `${Math.round(canvasRect.width)}x${Math.round(canvasRect.height)}` : 'none'} sceneCanvas=${sceneCanvasRect ? `${Math.round(sceneCanvasRect.width)}x${Math.round(sceneCanvasRect.height)}` : 'none'}`,
            `scale=${scale ? `${Number(scale.x || 0).toFixed(6)}` : currentScale.toFixed(6)} pref=${preferredScale.toFixed(6)}`,
            `rot=${rotation ? `${rotation.x} ${rotation.y} ${rotation.z}` : 'n/a'}`,
            `modelPos=${modelWrapper ? modelWrapper.getAttribute('position').x : 0} ${modelWrapper ? modelWrapper.getAttribute('position').y : 0} ${modelWrapper ? modelWrapper.getAttribute('position').z : 0}`,
            `events=${activeEvents}`,
          ].join('\n');
        }

        function ensureLayersVisible() {
          const video = document.querySelector('video');
          const canvas = document.querySelector('.a-canvas');
          const viewportSize = getViewportSize();
          const viewportWidth = viewportSize.width;
          const viewportHeight = viewportSize.height;

          document.documentElement.style.setProperty('--cq-vw', viewportWidth + 'px');
          document.documentElement.style.setProperty('--cq-vh', viewportHeight + 'px');

          if (!video) {
            pushDebug('video element not ready yet');
            reportDiagnostics('no-video-yet', viewportWidth, viewportHeight);
            refreshRuntimeDebug();
            return false;
          }

          if (trackedVideo !== video) {
            trackedVideo = video;
            pushDebug('video element attached');
            video.addEventListener('loadedmetadata', function () {
              pushDebug(`video metadata ${video.videoWidth}x${video.videoHeight}`);
            });
            video.addEventListener('playing', function () {
              pushDebug('video playing');
            });
            video.addEventListener('stalled', function () {
              pushDebug('video stalled');
            });
            video.addEventListener('error', function () {
              pushDebug('video error');
            });
          }

          video.setAttribute('playsinline', 'true');
          video.muted = true;
          video.style.display = 'block';
          video.style.opacity = '1';
          video.style.visibility = 'visible';
          video.style.position = 'fixed';
          video.style.inset = '0';
          video.style.bottom = '0';
          video.style.right = '0';
          video.style.zIndex = '1';
          video.style.objectFit = 'cover';
          video.style.objectPosition = 'center center';
          video.style.transform = 'none';
          video.style.width = viewportWidth + 'px';
          video.style.height = viewportHeight + 'px';
          video.style.minWidth = viewportWidth + 'px';
          video.style.minHeight = viewportHeight + 'px';
          video.style.maxWidth = 'none';
          video.style.maxHeight = 'none';

          if (canvas) {
            canvas.style.position = 'fixed';
            canvas.style.inset = '0';
            canvas.style.bottom = '0';
            canvas.style.right = '0';
            canvas.style.width = viewportWidth + 'px';
            canvas.style.height = viewportHeight + 'px';
            canvas.style.minWidth = viewportWidth + 'px';
            canvas.style.minHeight = viewportHeight + 'px';
            canvas.style.display = 'block';
            canvas.style.zIndex = '2';
          }

          if (scene.canvas) {
            scene.canvas.style.position = 'fixed';
            scene.canvas.style.inset = '0';
            scene.canvas.style.bottom = '0';
            scene.canvas.style.right = '0';
            scene.canvas.style.width = viewportWidth + 'px';
            scene.canvas.style.height = viewportHeight + 'px';
            scene.canvas.style.minWidth = viewportWidth + 'px';
            scene.canvas.style.minHeight = viewportHeight + 'px';
          }

          scene.style.position = 'fixed';
          scene.style.inset = '0';
          scene.style.bottom = '0';
          scene.style.right = '0';
          scene.style.width = viewportWidth + 'px';
          scene.style.height = viewportHeight + 'px';
          scene.style.minWidth = viewportWidth + 'px';
          scene.style.minHeight = viewportHeight + 'px';
          scene.style.zIndex = '2';

          if (scene.renderer && scene.camera) {
            try {
              scene.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            } catch {
              // Keep the stable AR baseline even if some devices reject manual sync.
            }
          }

          reportDiagnostics('layers-visible', viewportWidth, viewportHeight);
          refreshRuntimeDebug();

          return true;
        }

        function applyScale(scale, shouldPersist) {
          currentScale = clampScale(scale);
          if (shouldPersist !== false) {
            preferredScale = currentScale;
            savePreferredScale(preferredScale);
          }
          model.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          model.setAttribute('position', '0 0 0');
          refreshRuntimeDebug();
        }

        function applyBaseRotation(extraYDegrees) {
          const y = BASE_ROTATION.y + (extraYDegrees || 0);
          model.setAttribute('rotation', `${BASE_ROTATION.x} ${y} ${BASE_ROTATION.z}`);
          refreshRuntimeDebug();
        }

        function setFinalPlacement() {
          modelWrapper.setAttribute('position', '0 0 0');
          applyScale(preferredScale, false);
          applyBaseRotation(0);
        }

        function setEntryStartPlacement() {
          modelWrapper.setAttribute('position', `0 ${-ENTRY_RISE} 0`);
          model.setAttribute('scale', '0 0 0');
          currentScale = 0;
          applyBaseRotation(0);
        }

        function easeInOutSine(t) {
          return -(Math.cos(Math.PI * t) - 1) / 2;
        }

        function playEntryAnimation() {
          if (hasPlayedEntryAnimation || isEntryAnimationRunning) {
            setFinalPlacement();
            resetNarrative();
            return;
          }

          hasPlayedEntryAnimation = true;
          isEntryAnimationRunning = true;
          resetNarrative();
          setEntryStartPlacement();
          modelWrapper.setAttribute('visible', 'true');

          const startTime = performance.now();

          function step(now) {
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / ENTRY_DURATION_MS, 1);
            const eased = easeInOutSine(progress);
            const currentY = -ENTRY_RISE * (1 - eased);
            const scale = preferredScale * eased;
            const spin = 360 * eased;

            modelWrapper.setAttribute('position', `0 ${currentY.toFixed(6)} 0`);
            currentScale = scale;
            model.setAttribute('scale', `${scale} ${scale} ${scale}`);
            model.setAttribute('position', '0 0 0');
            applyBaseRotation(spin);

            if (progress < 1) {
              window.requestAnimationFrame(step);
              return;
            }

            isEntryAnimationRunning = false;
            setFinalPlacement();
            resetNarrative();
            if (markerVisible) {
              setNarrativeVisibility(true, false);
            }
          }

          window.requestAnimationFrame(step);
        }

        function hideUnwantedMeshes(root) {
          root.traverse(function (obj) {
            if (!obj.isMesh) {
              return;
            }

            if (HIDDEN_MESHES.has(obj.name)) {
              obj.visible = false;
              return;
            }

            obj.frustumCulled = false;
            if (obj.material) {
              if (Array.isArray(obj.material)) {
                obj.material.forEach(function (material) {
                  if (material) {
                    material.side = AFRAME.THREE.DoubleSide;
                    material.needsUpdate = true;
                  }
                });
              } else {
                obj.material.side = AFRAME.THREE.DoubleSide;
                obj.material.needsUpdate = true;
              }
            }
          });
        }

        function updateNarrativeAnchorPosition() {
          if (
            !markerVisible ||
            !narrativeAnchor ||
            !scene.camera
          ) {
            if (narrativeAnchor) {
              narrativeAnchor.classList.remove('visible');
            }
            return;
          }

          const viewportSize = getViewportSize();
          const viewportWidth = viewportSize.width;
          const viewportHeight = viewportSize.height;
          const three = AFRAME.THREE;
          const useModelAnchor = modelReady && !!model.getObject3D('mesh');
          const anchorObject = useModelAnchor ? model.object3D : marker.object3D;
          const topWorldPos = useModelAnchor
            ? new three.Vector3(0, MODEL_HEIGHT + 42, 0)
            : new three.Vector3(0, 0.48, 0);
          const sideWorldPos = useModelAnchor
            ? new three.Vector3(MODEL_WIDTH * 0.36, MODEL_HEIGHT * 0.72, 0)
            : new three.Vector3(0.32, 0.28, 0);
          const centerWorldPos = useModelAnchor
            ? new three.Vector3(0, MODEL_HEIGHT * 0.55, 0)
            : new three.Vector3(0, 0.22, 0);

          anchorObject.localToWorld(topWorldPos);
          anchorObject.localToWorld(sideWorldPos);
          anchorObject.localToWorld(centerWorldPos);
          topWorldPos.project(scene.camera);
          sideWorldPos.project(scene.camera);
          centerWorldPos.project(scene.camera);

          const points = [topWorldPos, sideWorldPos, centerWorldPos];
          const inView = points.every(function (point) {
            return Number.isFinite(point.x) && Number.isFinite(point.y) && Number.isFinite(point.z);
          });

          if (!inView) {
            narrativeAnchor.classList.remove('visible');
            return;
          }

          const topX = (topWorldPos.x * 0.5 + 0.5) * viewportWidth;
          const topY = (-topWorldPos.y * 0.5 + 0.5) * viewportHeight;
          const sideX = (sideWorldPos.x * 0.5 + 0.5) * viewportWidth;
          const centerX = (centerWorldPos.x * 0.5 + 0.5) * viewportWidth;
          const direction =
            currentBubbleSide === 'left'
              ? -1
              : currentBubbleSide === 'right'
                ? 1
                : sideX >= centerX
                  ? 1
                  : -1;
          const horizontalOffset = Math.max(28, viewportWidth * 0.035);
          const verticalOffset = Math.max(18, viewportHeight * 0.02);
          const anchorX = Math.min(
            viewportWidth - 12,
            Math.max(12, topX + direction * horizontalOffset)
          );
          const anchorY = Math.min(
            viewportHeight - 12,
            Math.max(12, topY - verticalOffset)
          );

          narrativeAnchor.style.left = `${anchorX}px`;
          narrativeAnchor.style.top = `${anchorY}px`;
          narrativeAnchor.style.transform =
            direction > 0 ? 'translate(0, -100%)' : 'translate(-100%, -100%)';
        }

        function animationTick() {
          updateNarrativeAnchorPosition();
          window.requestAnimationFrame(animationTick);
        }

        function scheduleEnsureLayersVisible() {
          [250, 800, 1600, 2600].forEach(function (delay) {
            window.setTimeout(ensureLayersVisible, delay);
          });
        }

        if (debugLogPanel) {
          debugLogPanel.classList.toggle('visible', DEBUG_ENABLED);
        }
        refreshRuntimeDebug();
        pushDebug('script booted');
        pushDebug(window.AFRAME ? 'AFRAME ready' : 'AFRAME missing');

        scene.addEventListener('loaded', function () {
          pushDebug('scene loaded');
          currentLanguage = getLang();
          preferredScale = loadPreferredScale();
          currentScale = preferredScale;
          if (narrativePrompt) {
            narrativePrompt.textContent =
              currentLanguage === 'zh' ? '点击天坛，开始对话。' : 'Tap the Temple to start the story.';
          }
          hideLoader();
          const videoReady = ensureLayersVisible();
          setStatus(
            videoReady
              ? 'AR scene loaded. Point the camera at the custom Temple marker.'
              : 'AR scene loaded, but camera video is not visible yet.'
          );
          scheduleEnsureLayersVisible();
          emit('scene-loaded');
        });

        scene.addEventListener('camera-init', function () {
          pushDebug('camera-init');
          ensureLayersVisible();
          scheduleEnsureLayersVisible();
          setStatus('Camera initialized. Point the camera at the custom Temple marker.');
          emit('camera-init');
        });

        scene.addEventListener('render-target-loaded', function () {
          pushDebug('render-target-loaded');
          ensureLayersVisible();
          scheduleEnsureLayersVisible();
        });

        scene.addEventListener('camera-error', function (event) {
          const detail = event && event.detail ? JSON.stringify(event.detail) : 'Camera error.';
          pushDebug(`camera-error ${detail}`);
          setStatus(detail);
          emit('error', detail);
        });

        marker.addEventListener('markerFound', function () {
          markerVisible = true;
          ensureLayersVisible();
          setStatus(
            modelReady
              ? currentLanguage === 'zh'
                ? '已识别到天坛标记。模型已贴合 marker，点击天坛气泡可开始对话。'
                : 'Temple marker detected. Tap the model to start the dialogue.'
              : currentLanguage === 'zh'
                ? '已识别到天坛标记，模型仍在加载中，请保持画面稳定。'
                : 'Temple marker detected. The model is still loading, please hold steady.'
          );
          if (modelWrapper) {
            if (!hasPlayedEntryAnimation) {
              playEntryAnimation();
            } else {
              modelWrapper.setAttribute('visible', 'true');
              setFinalPlacement();
              resetNarrative();
              setNarrativeVisibility(true, false);
            }
          }
          emit('marker-found');
        });

        marker.addEventListener('markerLost', function () {
          markerVisible = false;
          setNarrativeVisibility(false, false);
          setStatus('Marker lost. Move the Temple marker back into view.');
          if (modelWrapper && !isEntryAnimationRunning) {
            modelWrapper.setAttribute('visible', 'false');
          }
          emit('marker-lost');
        });

        model.addEventListener('model-loaded', function () {
          pushDebug('model-loaded');
          modelReady = true;
          const meshRoot = model.getObject3D('mesh');
          if (meshRoot) {
            hideUnwantedMeshes(meshRoot);
            meshRoot.visible = true;
          }

          applyScale(preferredScale, false);
          applyBaseRotation(0);
          if (modelWrapper) {
            modelWrapper.setAttribute('visible', markerVisible ? 'true' : 'false');
          }
          setStatus(
            markerVisible
              ? currentLanguage === 'zh'
                ? '天坛模型已加载并显示。点击漫画气泡可开始对话。'
                : 'Temple model loaded and displayed. Tap the bubble to start the dialogue.'
              : currentLanguage === 'zh'
                ? '天坛模型已加载。请将识别图放入画面中。'
                : 'Temple model loaded. Point the camera at the marker.'
          );
          emit('model-loaded');
        });

        model.addEventListener('model-error', function () {
          pushDebug('model-error');
          setStatus('Temple model failed to load, but marker test can still continue.');
          emit('error', 'Temple model failed to load.');
        });

        window.addEventListener('error', function (event) {
          pushDebug(`window-error ${event.message || 'unknown'}`);
          setStatus(event.message || 'Unknown runtime error.');
          emit('error', event.message || 'Unknown runtime error.');
        });

        if (scaleDownButton) {
          scaleDownButton.addEventListener('click', function () {
            applyScale(currentScale * 0.85);
          });
        }

        if (scaleResetButton) {
          scaleResetButton.addEventListener('click', function () {
            applyScale(DEFAULT_SCALE);
          });
        }

        if (scaleUpButton) {
          scaleUpButton.addEventListener('click', function () {
            applyScale(currentScale * 1.18);
          });
        }

        if (narrativePrompt) {
          narrativePrompt.addEventListener('click', function () {
            advanceNarrative();
          });
        }

        if (narrativeBubble) {
          narrativeBubble.addEventListener('click', function () {
            if (narrativeIndex >= narrativeLines[currentLanguage].length - 1) {
              narrativeIndex = -1;
            }
            advanceNarrative();
          });
        }

        window.requestAnimationFrame(animationTick);
        window.addEventListener('resize', ensureLayersVisible);
        window.addEventListener('orientationchange', ensureLayersVisible);
        window.setInterval(refreshRuntimeDebug, 1200);
        window.setTimeout(function () {
          if (!trackedVideo) {
            pushDebug('watchdog: no video after 4s');
          }
        }, 4000);
        window.setTimeout(function () {
          if (!trackedVideo) {
            pushDebug('watchdog: still no video after 8s');
          }
        }, 8000);
      })();
    </script>
  </body>
  </html>
